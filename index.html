<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>任务清单</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      max-width: 600px;
      margin: 30px auto;
      padding: 0 20px;
      background: #f6f7f9;
    }
    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    #taskInput {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
    }
    #addBtn {
      padding: 10px 18px;
      background: #4e6ef2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #addBtn:active {
      background: #3d5bd2;
    }
    .task-list {
      list-style: none;
    }
    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: white;
      border-radius: 6px;
      margin-bottom: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .del-btn {
      color: #ff4d4f;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="input-box">
    <input type="text" id="taskInput" placeholder="请输入任务" />
    <button id="addBtn">添加</button>
  </div>
  <ul class="task-list" id="taskList"></ul>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');

    // 添加任务
    function addTask() {
      const val = taskInput.value.trim();
      if (!val) return;

      const li = document.createElement('li');
      li.className = 'task-item';
      li.innerHTML = `
        <span>${val}</span>
        <button class="del-btn">删除</button>
      `;

      // 删除当前项
      li.querySelector('.del-btn').addEventListener('click', () => {
        li.remove();
      });

      taskList.appendChild(li);
      taskInput.value = '';
    }

    // 点击添加
    addBtn.addEventListener('click', addTask);

    // 回车添加
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });
  </script>
</body>
</html>
