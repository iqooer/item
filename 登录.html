<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录页面</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{background-color: #f0f2f5;display: flex;justify-content: center;align-items: center;height: 100vh;}
        .login-box{
            width: 350px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px #ddd;
        }
        h2{text-align: center;margin-bottom: 30px;color: #333;}
        .item{margin-bottom: 20px;}
        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-btn{
            width: 100%;
            padding: 12px;
            background: #0066ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>用户登录</h2>
        <div class="item">
            <input type="text" placeholder="请输入账号">
        </div>
        <div class="item">
            <input type="password" placeholder="请输入密码">
        </div>
        <button class="login-btn">立即登录</button>
    </div>
</body>
</html>
